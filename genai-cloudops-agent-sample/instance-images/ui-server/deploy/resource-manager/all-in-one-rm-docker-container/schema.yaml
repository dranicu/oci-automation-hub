title: OCI Agent All-In-One Docker
description: Builds the bundled source with Docker on the Resource Manager Terraform host, pushes to OCIR, and deploys Container Instance behind a Load Balancer.
schemaVersion: 1.1.0
version: "20260522"

variableGroups:
  - title: Required
    variables:
      - region
      - compartment_id
      - tenancy_id
      - availability_domain
      - vcn_name
      - container_subnet_name
      - load_balancer_subnet_names
      - oci_genai_project_id
      - genai_compartment_id
  - title: Container Image
    variables:
      - ocir_region_key
      - ocir_namespace
      - image_repository
      - image_tag
      - container_platform
      - docker_host
      - container_image_override
  - title: Compute
    variables:
      - shape
      - ocpus
      - memory_in_gbs
      - app_port
      - app_base_url
  - title: Load Balancer
    variables:
      - lb_min_bandwidth_mbps
      - lb_max_bandwidth_mbps
      - lb_certificate_name
      - lb_certificate_public_pem_base64
      - lb_certificate_private_key_pem_base64
      - lb_certificate_ca_pem_base64
      - lb_certificate_public_pem
      - lb_certificate_private_key_pem
      - lb_certificate_ca_pem
  - title: Private Registry
    variables:
      - registry_username
      - registry_password
  - title: Optional Authentication
    variables:
      - auth_enabled
      - identity_domain_issuer
      - oidc_client_id
      - oidc_client_secret
  - title: Optional IAM Automation
    variables:
      - create_iam_policy

variables:
  region:
    title: Region
    type: string
    required: true
  compartment_id:
    title: Deployment Compartment OCID
    type: oci:identity:compartment:id
    required: true
  tenancy_id:
    title: Tenancy OCID
    type: string
    required: false
  availability_domain:
    title: Availability Domain
    type: string
    required: true
  vcn_name:
    title: VCN Name
    type: string
    required: true
  container_subnet_name:
    title: Container Backend Subnet Name
    type: string
    required: true
  load_balancer_subnet_names:
    title: Load Balancer Subnet Names
    description: Comma-separated subnet display names, for example public-subnet-a,public-subnet-b.
    type: string
    required: true
  ocir_region_key:
    title: OCIR Region Key
    type: string
    default: iad
    enum:
      - iad
      - phx
      - sjc
      - ord
      - yul
      - gru
      - vcp
      - scl
      - bog
      - fra
      - ams
      - zrh
      - lhr
      - cwl
      - mad
      - mxp
      - arn
      - jnb
      - dxb
      - jed
      - bom
      - hyd
      - nrt
      - kix
      - icn
      - yny
      - syd
      - mel
      - sin
      - kul
    required: true
  ocir_namespace:
    title: OCIR Namespace
    type: string
    required: true
  image_repository:
    title: Image Repository
    type: string
    default: oci-agent
    required: true
  image_tag:
    title: Image Tag
    type: string
    default: latest
    required: true
  container_platform:
    title: Container Image Platform
    type: enum
    enum:
      - linux/arm64
      - linux/amd64
    default: linux/arm64
  docker_host:
    title: Docker-Compatible Socket
    description: Podman Docker-compatible socket used by the Terraform Docker provider.
    type: string
    default: unix:///run/user/1000/podman/podman.sock
  container_image_override:
    title: Full Image URL Override
    type: string
    required: false
  app_base_url:
    title: Public App URL / OIDC Base URL
    description: Use the HTTPS DNS name that points to the load balancer. IAM confidential app redirect URI is this value plus /auth/callback.
    type: string
    required: false
  lb_min_bandwidth_mbps:
    title: Load Balancer Minimum Bandwidth Mbps
    type: number
    default: 10
  lb_max_bandwidth_mbps:
    title: Load Balancer Maximum Bandwidth Mbps
    type: number
    default: 10
  lb_certificate_name:
    title: Load Balancer Certificate Name
    type: string
    default: oci-agent-cert
  lb_certificate_public_pem_base64:
    title: TLS Public Certificate
    description: Paste either base64-encoded PEM or raw PEM. Terraform auto-detects and normalizes it.
    type: string
    required: false
  lb_certificate_private_key_pem_base64:
    title: TLS Private Key
    description: Paste either base64-encoded PEM or raw PEM. Terraform auto-detects and normalizes it.
    type: password
    required: false
  lb_certificate_ca_pem_base64:
    title: TLS CA Chain
    description: Optional. Paste either base64-encoded PEM or raw PEM. Terraform auto-detects and normalizes it.
    type: string
    required: false
  lb_certificate_public_pem:
    title: TLS Public Certificate PEM
    description: Optional fallback. Prefer the TLS Public Certificate field above.
    type: string
    required: false
  lb_certificate_private_key_pem:
    title: TLS Private Key PEM
    description: Optional fallback. Prefer the TLS Private Key field above.
    type: password
    required: false
  lb_certificate_ca_pem:
    title: TLS CA Chain PEM
    type: string
    required: false
  registry_username:
    title: Registry Username
    type: string
    required: true
  registry_password:
    title: Registry Auth Token
    type: password
    required: true
  oci_genai_project_id:
    title: Generative AI Project OCID
    type: string
    required: true
  genai_compartment_id:
    title: Generative AI Compartment OCID
    type: string
    required: true
  create_iam_policy:
    title: Create Resource Principal IAM Policy
    type: boolean
    default: false
  auth_enabled:
    title: Enable OCI Identity Domain Login
    description: If true, set Public App URL and configure the IAM confidential app redirect URI to <Public App URL>/auth/callback.
    type: boolean
    default: false
  identity_domain_issuer:
    title: Identity Domain Issuer
    type: string
    required: false
  oidc_client_id:
    title: OIDC Client ID
    type: string
    required: false
  oidc_client_secret:
    title: OIDC Client Secret
    type: password
    required: false
