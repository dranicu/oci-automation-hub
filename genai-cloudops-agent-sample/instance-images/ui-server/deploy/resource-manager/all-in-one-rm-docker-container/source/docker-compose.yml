services:
  app:
    build:
      context: .
    image: oci-agent-mvp:latest
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      APP_DATA_DIR: /app/data
      OCI_CONFIG_FILE: /root/.oci/config
      APP_TLS_CERT_FILE: ${APP_TLS_CERT_FILE:-}
      APP_TLS_KEY_FILE: ${APP_TLS_KEY_FILE:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-replace-with-a-long-random-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      OCI_IDENTITY_DOMAIN_ISSUER: ${OCI_IDENTITY_DOMAIN_ISSUER:-}
      OCI_OIDC_CLIENT_ID: ${OCI_OIDC_CLIENT_ID:-}
      OCI_OIDC_CLIENT_SECRET: ${OCI_OIDC_CLIENT_SECRET:-}
      OCI_OIDC_REDIRECT_URI: ${OCI_OIDC_REDIRECT_URI:-http://localhost:8000/auth/callback}
      OCI_REGION: ${OCI_REGION:-us-chicago-1}
      CONFIG_PROFILE: ${CONFIG_PROFILE:-DEFAULT}
      OCI_GENAI_AUTH_MODE: ${OCI_GENAI_AUTH_MODE:-API_KEY}
      OCI_GENAI_API_KEY: ${OCI_GENAI_API_KEY:-}
      OCI_GENAI_PROJECT_ID: ${OCI_GENAI_PROJECT_ID:-}
      COMPARTMENT_ID: ${COMPARTMENT_ID:-}
      MODEL_ID: ${MODEL_ID:-openai.gpt-oss-120b}
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
      - ./certs:/app/certs:ro
      - ${HOME}/.oci:/root/.oci:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import os, ssl, urllib.request; port=os.getenv('PORT','8000'); tls=bool(os.getenv('APP_TLS_CERT_FILE') and os.getenv('APP_TLS_KEY_FILE')); url=f\"{'https' if tls else 'http'}://127.0.0.1:{port}/healthz\"; ctx=ssl._create_unverified_context() if tls else None; urllib.request.urlopen(url, timeout=5, context=ctx).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app-data:
