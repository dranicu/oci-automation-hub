title: OCI Agent
description: Deploys the OCI Agent container image without sharing source code.
schemaVersion: 1.1.0
version: "20260522"

variableGroups:
  - title: Required
    variables:
      - region
      - compartment_id
      - tenancy_id
      - availability_domain
      - vcn_name
      - container_subnet_name
      - load_balancer_subnet_names
      - notification_topic_id
      - create_hosted_source_repository
      - hosted_source_repository_name
      - git_username
      - git_auth_token
      - oci_genai_project_id
      - genai_compartment_id
  - title: Container Image
    variables:
      - ocir_region_key
      - ocir_namespace
      - image_repository
      - image_tag
      - container_platform
      - container_image_override
  - title: Source Build
    variables:
      - source_connection_type
      - source_connection_id
      - source_repository_url
      - source_repository_branch
      - source_repository_id
      - build_spec_file
      - build_runner_type
      - build_image
      - run_build
  - title: Compute
    variables:
      - shape
      - ocpus
      - memory_in_gbs
      - app_port
      - app_base_url
  - title: Load Balancer
    variables:
      - lb_min_bandwidth_mbps
      - lb_max_bandwidth_mbps
      - lb_certificate_name
      - lb_certificate_public_pem
      - lb_certificate_private_key_pem
      - lb_certificate_ca_pem
  - title: Private Registry
    variables:
      - registry_username
      - registry_password
  - title: Optional Authentication
    variables:
      - auth_enabled
      - identity_domain_issuer
      - oidc_client_id
      - oidc_client_secret
  - title: Optional IAM Automation
    variables:
      - create_iam_policy

variables:
  region:
    title: Region
    type: string
    required: true
  compartment_id:
    title: Deployment Compartment OCID
    type: oci:identity:compartment:id
    required: true
  tenancy_id:
    title: Tenancy OCID
    type: string
    required: false
  availability_domain:
    title: Availability Domain
    type: string
    required: true
  vcn_name:
    title: VCN Name
    type: string
    required: true
  container_subnet_name:
    title: Container Backend Subnet Name
    type: string
    required: true
  load_balancer_subnet_names:
    title: Load Balancer Subnet Names
    description: Comma-separated subnet display names, for example public-subnet-a,public-subnet-b.
    type: string
    required: true
  notification_topic_id:
    title: DevOps Notification Topic OCID
    type: string
    required: true
  create_hosted_source_repository:
    title: Create Hosted Source Repository
    type: boolean
    default: true
  hosted_source_repository_name:
    title: Hosted Source Repository Name
    type: string
    default: oci-agent-source
  git_username:
    title: Git Username
    type: string
    required: false
  git_auth_token:
    title: Git Auth Token
    type: password
    required: false
  ocir_region_key:
    title: OCIR Region Key
    type: string
    default: iad
    enum:
      - iad
      - phx
      - sjc
      - ord
      - yul
      - gru
      - vcp
      - scl
      - bog
      - fra
      - ams
      - zrh
      - lhr
      - cwl
      - mad
      - mxp
      - arn
      - jnb
      - dxb
      - jed
      - bom
      - hyd
      - nrt
      - kix
      - icn
      - yny
      - syd
      - mel
      - sin
      - kul
    required: true
  ocir_namespace:
    title: OCIR Namespace
    type: string
    required: true
  image_repository:
    title: Image Repository
    type: string
    default: oci-agent
    required: true
  image_tag:
    title: Image Tag
    type: string
    default: latest
    required: true
  container_platform:
    title: Container Image Platform
    type: enum
    enum:
      - linux/arm64
      - linux/amd64
    default: linux/arm64
  source_connection_type:
    title: Source Connection Type
    type: enum
    enum:
      - GITHUB
      - GITLAB
      - BITBUCKET_CLOUD
      - VBS
      - DEVOPS_CODE_REPOSITORY
    default: GITHUB
  source_connection_id:
    title: DevOps Connection OCID
    type: string
    required: false
  source_repository_url:
    title: Source Repository URL
    type: string
    required: false
  source_repository_branch:
    title: Source Repository Branch
    type: string
    default: main
  source_repository_id:
    title: OCI DevOps Code Repository OCID
    type: string
    required: false
  build_spec_file:
    title: Build Spec File
    type: string
    default: build_spec.yaml
  build_runner_type:
    title: Build Runner Type
    type: string
    default: DEFAULT
  build_image:
    title: Build Environment Image
    type: string
    default: OL7_X86_64_STANDARD_10
  run_build:
    title: Start Build Run
    type: boolean
    default: true
  container_image_override:
    title: Full Image URL Override
    type: string
    required: false
  app_base_url:
    title: Public App URL / OIDC Base URL
    description: Use the HTTPS DNS name that points to the load balancer. IAM confidential app redirect URI is this value plus /auth/callback.
    type: string
    required: false
  lb_min_bandwidth_mbps:
    title: Load Balancer Minimum Bandwidth Mbps
    type: number
    default: 10
  lb_max_bandwidth_mbps:
    title: Load Balancer Maximum Bandwidth Mbps
    type: number
    default: 10
  lb_certificate_name:
    title: Load Balancer Certificate Name
    type: string
    default: oci-agent-cert
  lb_certificate_public_pem:
    title: TLS Public Certificate PEM
    description: Optional. Provide with private key to enable HTTPS listener on the load balancer.
    type: string
    required: false
  lb_certificate_private_key_pem:
    title: TLS Private Key PEM
    description: Optional. Provide with public certificate to enable HTTPS listener on the load balancer.
    type: password
    required: false
  lb_certificate_ca_pem:
    title: TLS CA Chain PEM
    type: string
    required: false
  registry_username:
    title: Registry Username
    type: string
    required: false
  registry_password:
    title: Registry Auth Token
    type: password
    required: false
  oci_genai_project_id:
    title: Generative AI Project OCID
    type: string
    required: true
  genai_compartment_id:
    title: Generative AI Compartment OCID
    type: string
    required: true
  create_iam_policy:
    title: Create Resource Principal IAM Policy
    type: boolean
    default: false
  auth_enabled:
    title: Enable OCI Identity Domain Login
    description: If true, set Public App URL and configure the IAM confidential app redirect URI to <Public App URL>/auth/callback.
    type: boolean
    default: false
  identity_domain_issuer:
    title: Identity Domain Issuer
    type: string
    required: false
  oidc_client_id:
    title: OIDC Client ID
    type: string
    required: false
  oidc_client_secret:
    title: OIDC Client Secret
    type: password
    required: false
