title: OCI Agent Enterprise AI Application
description: Captures inputs for deploying the OCI Agent image as an OCI Generative AI hosted application.
schemaVersion: 1.1.0
version: "20260522"

variableGroups:
  - title: Required
    variables:
      - region
      - compartment_id
      - app_name
  - title: Container Image
    variables:
      - ocir_region_key
      - ocir_namespace
      - image_repository
      - image_tag
  - title: Enterprise AI Authentication
    variables:
      - identity_domain_url
      - create_iam_confidential_app
      - iam_confidential_app_name
      - iam_confidential_app_client_secret
      - identity_domain_scope
      - identity_domain_audience
      - oauth_scope_name
  - title: Enterprise AI Runtime
    variables:
      - min_replicas
      - max_replicas
      - concurrency_target
      - endpoint_type

variables:
  region:
    title: Region
    type: string
    required: true
  compartment_id:
    title: Enterprise AI Application Compartment OCID
    type: oci:identity:compartment:id
    required: true
  app_name:
    title: Application Name
    type: string
    default: oci-agent
    required: true
  ocir_region_key:
    title: OCIR Region Key
    type: string
    default: iad
    required: true
  ocir_namespace:
    title: OCIR Namespace
    type: string
    required: true
  image_repository:
    title: Image Repository
    type: string
    default: oci-agent
    required: true
  image_tag:
    title: Image Tag
    type: string
    default: latest
    required: true
  identity_domain_url:
    title: Identity Domain URL
    type: string
    required: true
  create_iam_confidential_app:
    title: Create IAM Confidential App
    type: boolean
    default: false
  iam_confidential_app_name:
    title: IAM Confidential App Name
    type: string
    default: oci-agent-enterprise-ai
  iam_confidential_app_client_secret:
    title: IAM Confidential App Client Secret
    type: password
    required: false
  identity_domain_scope:
    title: OAuth Scope
    type: string
    default: openid profile email
    required: false
  identity_domain_audience:
    title: OAuth Audience
    type: string
    required: false
  oauth_scope_name:
    title: OAuth Scope Name
    type: string
    default: agentic
  min_replicas:
    title: Minimum Replicas
    type: number
    default: 1
  max_replicas:
    title: Maximum Replicas
    type: number
    default: 3
  concurrency_target:
    title: Concurrency Target
    type: number
    default: 25
  endpoint_type:
    title: Endpoint Type
    type: enum
    enum:
      - PUBLIC
      - PRIVATE
    default: PUBLIC
