title: Chaos Mesh on oke
schemaVersion: 1.1.0
version: "20190304"
locale: "en"

variableGroups:
  - title: "SSH Key"
    variables:
      - ssh_public_key
  - title: "Pre-Defined"
    variables:
      - compartment_ocid
  - title: "OKE add-ons"
    variables:
      - enable_metrics_server
      - enable_cert_manager

  - title: "network hidden vars"
    visible: false
    variables:
      - cidr_blocks
      - vcn_display_name
      - api_endpoint_subnet_cidr
      - lb_subnet_cidr
      - nodepool_subnet_cidr
      - pods_subnet_cidr
      - region
      - tenancy_ocid



variables:

  compartment_ocid:
    type: oci:identity:compartment:id
    required: true
    visible: true
    title: "Compartment"
    description: "Choose compartment where you want to deploy the resources"

  ssh_public_key:
    type: oci:core:ssh:publickey
    title: "SSH Public Key"
    description: "SSH Public Key that will be used to access karmada Host"
    required: true
    default: ""
    visible: true

  kubernetes_version:
    type: oci:kubernetes:versions:id
    title: Kubernetes version
    description: The Oracle cloud kubernetes version for tenancy.
    required: true
    visible: true
    dependsOn:
      compartmentId: ${compartment_ocid}
      clusterOptionId: "all"

  user_ocid:
    type: string
    title: "User OCID"
    description: "Only required when running via Terraform CLI"
    required: false
    visible: false
    default: ""

  fingerprint:
    type: string
    title: "API Key Fingerprint"
    description: "Only required when running via Terraform CLI"
    required: false
    visible: false
    default: ""

  private_key_path:
    type: string
    title: "Private Key Path"
    description: "Only required when running via Terraform CLI"
    required: false
    visible: false
    default: ""

  service_dashboard_type:
    type: enum
    enum:
    - LoadBalancer
    - NodePort
    - ClusterIP
    default: ClusterIP
    title: "Dashboard Service Type"
    description: "Dashboard Service Type"
    required: true
    visible: true

  enable_metrics_server:
    type: boolean
    title: "Enable Metrics Server"
    description: "Enable the OKE Kubernetes Metrics Server add-on required for HPA CPU/memory metrics."
    required: true
    default: true
    visible: true

  enable_cert_manager:
    type: boolean
    title: "Enable cert-manager"
    description: "Enable the OKE cert-manager add-on. Not required for standard HPA; enable only if your workloads/add-ons need certificate automation."
    required: true
    default: true
    visible: true


